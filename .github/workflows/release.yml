name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        run: |
          ZIG_VERSION=0.15.2
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o /tmp/zig.tar.xz
          tar -xf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            dpkg-dev \
            libadwaita-1-dev \
            libepoxy-dev \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            pkg-config

      - name: Build libghostty
        run: |
          cd ghostty
          zig build -Dapp-runtime=none -Doptimize=ReleaseFast

      - name: Download appimagetool
        run: |
          curl -fsSL "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -o /tmp/appimagetool
          chmod +x /tmp/appimagetool

      - name: Package release artifacts
        run: ./scripts/package.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            --title "Limux $TAG" \
            --generate-notes \
            dist/*
